name: Build Android APK

# Startet den Bauvorgang bei jedem Push oder wenn du ihn manuell startest
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code vom Repository abrufen
      uses: actions/checkout@v4

    - name: Java JDK 17 einrichten
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Baurechte für Gradle vergeben
      run: chmod +x gradlew

    - name: APK bauen (Debug Version)
      run: ./gradlew assembleDebug

    - name: Fertige APK als ZIP bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: MeineWebApp-APK
        path: app/build/outputs/apk/debug/app-debug.apk
